<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iVend | Admin Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f97316;
            --orange-dark: #ea580c;
            --navy: #0f172a;
            --navy-light: #1e293b;
            --off-white: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--off-white);
            color: var(--navy);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background-color: var(--navy);
            color: white;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            color: var(--orange);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 0.75rem;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            display: block;
            transition: 0.2s;
        }

        nav a:hover, nav a.active {
            background-color: var(--navy-light);
            color: white;
        }

        /* Main Content */
        main {
            margin-left: 260px;
            flex: 1;
            padding: 2.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            color: #64748b;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--navy);
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f1f5f9;
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
        }

        td {
            padding: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-error { background: #fee2e2; color: #991b1b; }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: var(--orange); }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background-color: var(--orange); color: white; }
        .btn-primary:hover { background-color: var(--orange-dark); }

        .messages {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .message.success { background: #d1fae5; color: #065f46; }
        .message.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>ivend</span>
        </div>
        <nav>
            <ul>
                <li><a href="{% url 'dashboard:home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">🏠 Overview</a></li>
                <li><a href="{% url 'dashboard:user-list' %}" class="{% if 'user' in request.path %}active{% endif %}">👥 Users & Wallets</a></li>
                <li><a href="{% url 'dashboard:send-notification' %}" class="{% if 'notification' in request.path %}active{% endif %}">🔔 Notifications</a></li>
                <li><a href="{% url 'admin:index' %}">⚙️ System Admin</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="user-info">
                <strong>{{ request.user.username }}</strong>
            </div>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
